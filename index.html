<!DOCTYPE html>
<html>
<head>
  <title>Best Product Site</title>
  <style>
    body{
      background:#111;
      color:white;
      font-family:Arial;
      text-align:center;
      padding:40px;
    }

    .card{
      background:#222;
      padding:20px;
      border-radius:15px;
      width:300px;
      margin:auto;
      box-shadow:0 0 10px rgba(255,255,255,0.2);
    }

    img{
      width:100%;
      border-radius:10px;
    }

    button{
      background:red;
      color:white;
      border:none;
      padding:12px 20px;
      border-radius:10px;
      cursor:pointer;
      font-size:16px;
    }

    button:hover{
      background:orange;
    }
  </style>
</head>

<body>

  <h1>🔥 Best Product Store</h1>

  <div class="card">
    <img src="https://via.placeholder.com/300" alt="product">

    <h2>Smart Watch</h2>

    <p>Best smartwatch for daily use.</p>

    <h3>₹1999</h3>

    <<a href="https://www.amazon.in" target="_blank">
  <button>Buy Now</button>
</a>
  </div>

</body>
</html>
